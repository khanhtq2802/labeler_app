# Copy this file to config.yaml and edit the values for your machine.

# Where the invoice images live, and the CSV that defines labeling order.
# image_folders accepts one or more folders. If a CSV image is found in more
# than one folder you'll be asked which to use; if it's in none you'll be warned.
# (The legacy single-folder key `image_folder_path: "..."` still works.)
image_folders:
  - "/path/to/your/images"
csv_path: "/path/to/your/labels.csv"

# Column in the CSV that holds the image filename.
image_name_column: "image_file_name"

# Appended to the filename if it doesn't already have an extension.
# Leave as "" if the column already contains the full filename with extension.
file_extension: ".jpg"

# Language codes (ISO 639-1). Used by OCR/translation engines.
original_language: "ja"
target_language: "vi"

# How translated overlays get produced: google_cloud | manual
# google_cloud is still in development and may not work well. manual just opens Google Translate in a browser tab for you to copy-paste from.
translation_method: "manual"

# Where translated images are cached so we never re-translate the same file.
cache_folder: "./cache"

# Where rotated copies of originals are saved when you rotate-and-save an image.
# The source files are never modified; the app uses the rotated copy if present.
rotated_folder: "./rotated"

# Where the "last viewed row" is remembered between runs.
state_file: "./state.json"

# Font used to draw translated text onto the image. Must support the target
# language's characters (Vietnamese needs diacritics). DejaVu Sans works on
# most Linux systems out of the box.
font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

google_cloud:
  # Path to a GCP service account JSON key with Vision + Translation access.
  # Alternatively, set the GOOGLE_APPLICATION_CREDENTIALS env var and leave this blank.
  credentials_json: ""

manual:
  # URL opened when you click "Open in Google Translate". sl/tl are pre-filled.
  translate_url: "https://translate.google.com/?sl={source}&tl={target}&op=images"

server:
  host: "127.0.0.1"
  port: 8000

# AI reference assistant. In the "Original" panel you can drag a box over a
# region, click "Ask AI", and a model answers about just that crop. Use
# "Edit question" to change the prompt for a single ask; the default below is
# pre-filled each time.
ai:
  # claude (Anthropic) or openai. claude is recommended (better vision).
  provider: "claude"
  # claude-opus-4-8 / claude-sonnet-4-6 for Claude; e.g. gpt-5.5 for openai.
  model: "claude-opus-4-8"

  # Route calls through a locally-running aiauth proxy so no API key is needed —
  # it reuses your Claude Code / Codex subscription token. Start it first with:
  #     aiauth serve            # leave running at 127.0.0.1:8787
  # (see https://github.com/khanhtq2802/aiauth). Set use_aiauth: false to call
  # the provider directly with api_key/base_url instead.
  use_aiauth: true
  aiauth_host: "127.0.0.1"
  aiauth_port: 8787

  # Only used when use_aiauth: false.
  api_key: ""
  base_url: ""

  # Pre-filled prompt for each "Ask AI"; editable per-question in the UI.
  default_question: "Hãy dịch từng phần nội dung trong vùng được chọn sang tiếng Việt và phân tích ý nghĩa của chúng."
  max_tokens: 1024
